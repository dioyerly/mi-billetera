<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Billetera Pastel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="balance-card">
            <p>DINERO DISPONIBLE</p>
            <h1 id="saldo-total">$0,00</h1>
            <small onclick="abrirModalSaldo()" style="cursor:pointer">Toca para ajustar saldo inicial</small>
        </header>

        <section class="controls">
            <button onclick="abrirModalSaldo()" class="btn btn-ingreso">＋ Entrada</button>
            <button onclick="mostrarModalGastoRapido()" class="btn btn-gasto">－ Gasto</button>
        </section>

        <section class="accesos-rapidos">
            <h3>Accesos Rápidos</h3>
            <div class="grid-botones" id="grid-botones">
                </div>
        </section>

        <section class="movimientos">
            <h3>Movimientos Recientes</h3>
            <div id="lista-movimientos">
                </div>
        </section>
    </div>

    <div id="modal-saldo" class="modal hidden">
        <div class="modal-content">
            <h2>Ajustar Dinero</h2>
            <input type="number" id="nuevo-saldo-input" placeholder="Monto $">
            <div class="modal-actions">
                <button onclick="cerrarModalSaldo()" class="btn-cancel">Cancelar</button>
                <button onclick="guardarSaldoInicial()" class="btn-confirm">Aplicar</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
